<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PROGAMMINGSHOP</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>

<h1 title="welcome bro">HELLO! THIS IS PROGAMMINGSHOP!</h1>

<div class="redirection">
    <button type="button" onclick="location.href='https://2015155030.github.io/HomeworkRepository/LAB2/login.html' ">로그인하러가기</button>
    <button type="button" onclick="location.href='https://2015155030.github.io/HomeworkRepository/LAB2/signup.html' ">가입하기</button>
 </div>

<div class="input">
<form method = "post" action="/examples/media/request.php" autocomplete="on">
        <label>이름:
            <input type="text" name="name" value="홍길동" autofocus >
        </label>
    <br><br>
        <label>생년월일:
            <input type="date" name="birthday">
        </label>
    <br><br>
        <label>성별:
            <input list="gender" name="gen" autocomplete="off">
            <datalist id="gender">
                <option value="남">
                <option value="여">
            </datalist>
        </label>
    <br><br>
        <label>이메일:
            <input type="email" name="email" placeholder="학번@yonsei.ac.kr"
			pattern="[a-zA-Z0-9]+[@][a-zA-Z0-9]+[.]+[a-zA-Z]+[.]*[a-zA-Z]*" title="이메일 양식">
        </label>
    <br><br>
        <label>유저 아이디:
            <input type="text" name="username" placeholder="아이디를 입력하세요" required>(필수입력)
        </label>
    <br><br>
        <label>비밀번호:
            <input type="text" name="password" placeholder="비밀번호를 입력하세요"autocomplete="off">
        </label>
    <br><br>    
        <label>비밀번호 확인:
            <input type="text" name="password" placeholder="비밀번호를 입력하세요"autocomplete="off">
        </label> 
    <br><br>    
    <label>개인정보 수집에 동의 하십니까?
        <input type="checkbox" name="yes">
        <label for="yes">네 동의 합니다.</label>
        <input type="checkbox" name="no" checked>
        <label for="no">아니요.</label>
    </label>      
    <br><br>     
</div>
<div class="button">
    <form method = "post" action="/examples/media/request.php"></form>
	<input type="submit" value="Signup">
	<input type="reset" value="Cancel">
 </div>
</form>
</body>
</html>
